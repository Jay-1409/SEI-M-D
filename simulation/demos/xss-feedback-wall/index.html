<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation #2 | XSS Feedback Wall</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* Add some specific simplified overrides to keep the theme but remove clutter */
    .status-indicator {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      font-size: 1.2rem;
      display: none;
    }
    .status-indicator.success {
      display: block;
      background-color: rgba(34, 197, 94, 0.1);
      color: #16a34a;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .status-indicator.error {
      display: block;
      background-color: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .status-indicator.idle {
      display: block;
      background-color: rgba(100, 116, 139, 0.1);
      color: #64748b;
      border: 1px solid rgba(100, 116, 139, 0.2);
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="expo-nav">
      <a href="../../index.html">Back to Launcher</a>
    </div>

    <main class="demo-grid" style="display: flex; justify-content: center; max-width: 600px; margin: 40px auto 0;">
      <section class="panel composer-panel" style="width: 100%;">
        <div class="panel-head" style="border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 1.5rem; margin-bottom: 2rem;">
          <h1 style="margin: 0; font-size: 2.2rem; display: flex; align-items: center; justify-content: space-between;">XSS Feedback Wall <span style="font-size: 0.7em; opacity: 0.7;">💬</span></h1>
          <p style="margin: 0.5rem 0 0 0; opacity: 0.7; font-weight: 500;">Leave Public Feedback</p>
        </div>

        <div class="field compact-field" style="margin-bottom: 20px;">
          <span>Target Gateway URL</span>
          <input id="urlInput" type="text" autocomplete="off" value="" placeholder="http://localhost:30080/<service-name>/comments">
        </div>

        <form id="comment-form" class="comment-form">
          <label class="field">
            <span>Name (Optional)</span>
            <input id="nameInput" type="text" maxlength="40" value="Visitor 1" autocomplete="off">
          </label>

          <label class="field">
            <span>Comment</span>
            <textarea id="commentInput" rows="7" placeholder="Share your event feedback here..."></textarea>
          </label>

          <div class="quick-actions">
            <button id="presetNormal" type="button" class="ghost-button">Use Normal Comment</button>
            <button id="presetAttack" type="button" class="ghost-button danger-ghost">Use Attack Payload</button>
          </div>

          <button id="submitButton" type="submit" class="primary-button" style="width: 100%; margin-top: 1rem;">Post Comment</button>

          <div id="statusIndicator" class="status-indicator idle">
            Waiting for request...
          </div>
        </form>

      </section>
    </main>
  </div>

  <script src="../../assets/global-env.js"></script>
  <script src="./script.js"></script>
</body>
</html>
