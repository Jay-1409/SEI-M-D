<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation #4 | API Key Protection</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .status-indicator {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      font-size: 1.2rem;
      display: none;
    }
    .status-indicator.success {
      display: block;
      background-color: rgba(34, 197, 94, 0.1);
      color: #16a34a;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .status-indicator.error {
      display: block;
      background-color: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .status-indicator.idle {
      display: block;
      background-color: rgba(100, 116, 139, 0.1);
      color: #64748b;
      border: 1px solid rgba(100, 116, 139, 0.2);
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="expo-nav">
      <a href="../../index.html">Back to Launcher</a>
    </div>
    <main class="demo-grid" style="display: flex; justify-content: center; max-width: 600px; margin: 40px auto 0;">
      <section class="panel request-panel" style="width: 100%;">
        <div class="panel-header" style="border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 1.5rem; margin-bottom: 2rem;">
          <h1 style="margin: 0; font-size: 2.2rem; display: flex; align-items: center; justify-content: space-between;">API Key Protection <span style="font-size: 0.7em; opacity: 0.7;">🔑</span></h1>
          <p style="margin: 0.5rem 0 0 0; opacity: 0.7; font-weight: 500;">Service Desk Request</p>
        </div>

        <form id="apiForm">
          <div class="form-group" style="margin-bottom: 20px;">
            <label for="urlInput">Target Gateway URL</label>
            <input id="urlInput" class="field-input text-input" type="text" autocomplete="off" value="http://localhost:30080/expo-api-demo/staff/open-maintenance-panel">
          </div>

          <div class="form-group" style="margin-bottom: 20px;">
            <label for="methodSelect">HTTP Method</label>
            <select id="methodSelect" class="field-input text-input">
              <option value="POST">POST (Typical for Staff Action)</option>
              <option value="GET">GET (Typical for Public Check)</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom: 20px;">
            <label for="apiKeyInput">Password (Access Key)</label>
            <input id="apiKeyInput" class="field-input text-input" type="password" autocomplete="off" placeholder="Enter staff key for protected action">
          </div>

          <div class="quick-actions" style="margin-bottom: 20px; display: flex; gap: 10px;">
            <button id="noKeyButton" class="ghost-button quick-button" type="button">No Key</button>
            <button id="validKeyButton" class="ghost-button quick-button" type="button">Valid Key</button>
            <button id="wrongKeyButton" class="ghost-button quick-button" type="button">Wrong Key</button>
          </div>

          <button id="sendRequestButton" class="primary-button" type="submit" style="width: 100%; margin-top: 1rem;">Send Request</button>

          <div id="statusIndicator" class="status-indicator idle">
            Waiting for request...
          </div>
        </form>

      </section>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
