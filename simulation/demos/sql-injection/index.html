<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation #1 | SQL Injection</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* Add some specific simplified overrides to keep the theme but remove clutter */
    .status-indicator {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      font-size: 1.2rem;
      display: none;
    }
    .status-indicator.success {
      display: block;
      background-color: rgba(34, 197, 94, 0.1);
      color: #16a34a;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .status-indicator.error {
      display: block;
      background-color: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .status-indicator.idle {
      display: block;
      background-color: rgba(100, 116, 139, 0.1);
      color: #64748b;
      border: 1px solid rgba(100, 116, 139, 0.2);
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="expo-nav">
      <a href="../../index.html">Back to Launcher</a>
    </div>
    <main class="main-grid" style="display: flex; justify-content: center; max-width: 600px; margin: 40px auto 0;">
      <section class="panel login-panel" style="width: 100%;">
        <div class="panel-header" style="border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 1.5rem; margin-bottom: 2rem;">
          <h1 style="margin: 0; font-size: 2.2rem; display: flex; align-items: center; justify-content: space-between;">SQL Injection <span style="font-size: 0.7em; opacity: 0.7;">💉</span></h1>
          <p style="margin: 0.5rem 0 0 0; opacity: 0.7; font-weight: 500;">Staff Attendance Portal</p>
        </div>

        <div class="form-group">
          <label for="urlInput">Target Gateway URL</label>
          <input id="urlInput" class="text-input" type="text" autocomplete="off" value="" placeholder="http://localhost:30080/<service-name>/login">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="usernameInput">Username</label>
            <input id="usernameInput" class="text-input" type="text" autocomplete="off" placeholder="Enter username (e.g., admin)">
          </div>

          <div class="form-group">
            <label for="passwordInput">Password</label>
            <input id="passwordInput" class="text-input" type="text" autocomplete="off" placeholder="Enter password or attack input">
          </div>
        </div>

        <div class="quick-actions">
          <button id="fillNormalButton" class="button secondary" type="button">Fill Normal User</button>
          <button id="fillAttackButton" class="button warning" type="button">Fill Attack Input</button>
        </div>

        <button id="loginButton" class="button primary login-button" type="button" style="width: 100%; margin-top: 1rem;">Send Login Request</button>

        <div id="statusIndicator" class="status-indicator idle">
          Waiting for request...
        </div>

      </section>
    </main>
  </div>

  <script src="../../assets/global-env.js"></script>
  <script src="./script.js"></script>
</body>
</html>
