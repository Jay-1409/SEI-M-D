---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nikto-service
  namespace: deployer-system
  labels:
    app: nikto-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nikto-service
  template:
    metadata:
      labels:
        app: nikto-service
    spec:
      containers:
        - name: nikto-service
          image: nikto-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: nikto-service
  namespace: deployer-system
spec:
  type: ClusterIP
  selector:
    app: nikto-service
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
