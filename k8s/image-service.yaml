---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-service
  namespace: deployer-system
  labels:
    app: image-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-service
  template:
    metadata:
      labels:
        app: image-service
    spec:
      containers:
        - name: image-service
          image: image-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket

---
apiVersion: v1
kind: Service
metadata:
  name: image-service
  namespace: deployer-system
spec:
  type: ClusterIP
  selector:
    app: image-service
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
