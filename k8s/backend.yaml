---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: deployer
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: deployer-backend
      containers:
        - name: backend
          image: deployer-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: K8S_NAMESPACE
              value: "deployer"
            - name: GATEWAY_HOST
              value: "localhost"
            - name: GATEWAY_PORT
              value: "30080"
            - name: GATEWAY_REGISTER_URL
              value: "http://gateway-service:8080"
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: deployer
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
